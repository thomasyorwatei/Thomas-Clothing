<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password | Thomas Clothing</title>
        <link rel="stylesheet" href="./src/css/main.css">
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="icon" type="image/svg+xml" href="./images/header/favicon.svg">
    </head>
    <body>
        <div class="header">
            <div class="container">
                <div class="navbar">
                    <div class="logo">
                        <a href="./index.html" class="logo-text">
                            <span class="logo-main">Thomas Clothing</span>
                            <span class="logo-sub">Premium Collection</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="formPage">
                <!-- Invalid / expired link state -->
                <div id="invalid-token" style="display:none;text-align:center;padding:40px 20px">
                    <i class="fa fa-exclamation-circle" style="font-size:40px;color:salmon;margin-bottom:16px"></i>
                    <h3>Invalid or Expired Link</h3>
                    <p style="opacity:0.75;margin:12px 0">This password reset link has expired or already been used.</p>
                    <a href="./account.html" class="btn" style="display:inline-block;margin-top:10px">Request a New Link</a>
                </div>

                <!-- Reset form -->
                <form class="showForm" id="resetForm" style="display:none" novalidate>
                    <h3>Set New Password</h3>
                    <div id="reset-msg" style="font-size:13px;text-align:center;display:none;margin-bottom:10px"></div>
                    <input type="password" id="new-password" placeholder="New password (min 8 chars)" required>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required>
                    <button type="submit" class="btn" id="reset-btn">Update Password</button>
                </form>

                <!-- Success state -->
                <div id="reset-success" style="display:none;text-align:center;padding:40px 20px">
                    <i class="fa fa-check-circle" style="font-size:40px;color:#5fa387;margin-bottom:16px"></i>
                    <h3>Password Updated!</h3>
                    <p style="opacity:0.75;margin:12px 0">Your password has been changed successfully.</p>
                    <a href="./account.html" class="btn" style="display:inline-block;margin-top:10px">Login Now</a>
                </div>
            </div>
        </div>

        <script src="./src/js/config.js"></script>
        <script src="./src/js/api.js"></script>
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                // Supabase puts the token in the URL hash as access_token
                const hash = new URLSearchParams(window.location.hash.replace('#', ''));
                const accessToken = hash.get('access_token');
                const type = hash.get('type');

                if (!accessToken || type !== 'recovery') {
                    document.getElementById('invalid-token').style.display = 'block';
                    return;
                }

                document.getElementById('resetForm').style.display = 'block';

                document.getElementById('resetForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('reset-btn');
                    const msgEl = document.getElementById('reset-msg');
                    const newPassword = document.getElementById('new-password').value;
                    const confirmPassword = document.getElementById('confirm-password').value;

                    msgEl.style.display = 'none';

                    if (newPassword.length < 8) {
                        msgEl.style.color = 'salmon';
                        msgEl.textContent = 'Password must be at least 8 characters.';
                        msgEl.style.display = 'block';
                        return;
                    }
                    if (newPassword !== confirmPassword) {
                        msgEl.style.color = 'salmon';
                        msgEl.textContent = 'Passwords do not match.';
                        msgEl.style.display = 'block';
                        return;
                    }

                    btn.disabled = true;
                    btn.textContent = 'Updating...';

                    try {
                        await API.post('/api/auth/reset-password', {
                            access_token: accessToken,
                            new_password: newPassword
                        });
                        document.getElementById('resetForm').style.display = 'none';
                        document.getElementById('reset-success').style.display = 'block';
                    } catch (err) {
                        msgEl.style.color = 'salmon';
                        msgEl.textContent = err.message || 'Failed to update password. Please request a new link.';
                        msgEl.style.display = 'block';
                        btn.disabled = false;
                        btn.textContent = 'Update Password';
                    }
                });
            });
        </script>
    </body>
</html>
